<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width ,initial-scale=1.0">

    <title>GK world</title>

    <!--css-->
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">

     <script src="https://cdn.tailwindcss.com"></script>

     <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-950/90 via-slate-900 to-slate-800 min-h-screen   ">


<nav class="fixed top-0  left-0 w-full bg-slate-950/90 backdrop-blur-md  z-50">

    <div class="max-w-7xl mx-auto px-6">

        <div class="flex items-center justify-between h-15">

            <!-- Logo -->
            <div class="flex items-center gap-3">

                <img
                    src="{{ url_for('static', filename='images/logo.png') }}"
                    alt="Logo"
                    class="w-16 h-16 object-contain"
                >

                <div>
                    <h1 class="text-white text-xl font-bold">
                        GK World
                    </h1>

                    <p class="text-slate-400 text-xs">
                        Learn • Quiz • Grow
                    </p>
                </div>

            </div>

            <!-- Nav Links -->
            <div class="hidden md:flex items-center gap-8">

                <a href="/"
                   class="text-slate-300 text-lg hover:text-purple-400 transition">
                    Home
                </a>

                <a href="/Quiz"
                   class="text-slate-300 text-lg hover:text-purple-400 transition">
                    Quiz
                </a>

                <a href="/Learn"
                    class="text-slate-300 text-lg hover:text-purple-400 transition ">
                    Learn
                </a>


                <a href="/Categories"
                   class="text-slate-300 text-lg hover:text-purple-400 transition">
                    Categories
                </a>

                <a href="#"
                   class="text-slate-300 text-lg hover:text-purple-400 transition">
                    Current Affairs
                </a>

                <a href="#"
                   class="text-slate-300 text-lg hover:text-purple-400 transition">
                    Leaderboard
                </a>

                

            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-3">

                <button
                    class="hidden md:block px-5 py-2 border border-slate-700 rounded-lg text-white hover:border-blue-700 transition">

                    Login

                </button>

                <button
                    class="px-5 py-2 bg-purple-600 hover:bg-gradient-to-br from-blue-700 to-purple-500 rounded-lg text-white transition">

                    Sign Up

                </button>

            </div>

        </div>

    </div>

</nav>


{% block content %}

{% endblock %}



<!--footer par-->
<footer class="mt-20 py-10">

    <div class="max-w-4xl mx-auto text-center border border-slate-800 rounded-2xl bg-slate-950/50 p-8">

        <h2 class="text-3xl font-bold bg-gradient-to-r from-sky-400 to-purple-500 bg-clip-text text-transparent">
            GK World
        </h2>

        <p class="text-slate-400 mt-3">
            Learn • Quiz • Grow
        </p>

        <p class="text-slate-500 text-sm mt-5">
            © 2026 GK World. All Rights Reserved.
        </p>

    </div>

</footer>




<!--js  file-->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>


</body>
</html>
